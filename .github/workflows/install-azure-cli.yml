name: Install Azure CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  install-azure-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Verify Azure CLI installation
        run: az --version
